    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;

      justify-content: center;
      background: #ffffff;

    .card {
      background: #ffffff;

      padding: 2rem 2.5rem;
      width: 100%;
      max-width: 400px;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      color: #111;
      text-align: center;
      margin-bottom: 1.5rem;
    }

      margin-bottom: 1rem;
    }

    input {
      width: 100%;
      padding: 9px 12px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    button {
      width: 100%;
      padding: 11px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }
  </style>
